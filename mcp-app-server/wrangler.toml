name = "drawio"
main = "src/worker.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm install --include=dev && npm run build:html && node_modules/.bin/tsc"

[vars]
ENVIRONMENT = "production"

[dev]
port = 8787
local_protocol = "http"

# ─── KV Session Storage (FREE tier — enables persistent sessions) ─────────────
# To activate, run these commands once, then uncomment the block below:
#
#   npx wrangler kv namespace create DIAGRAM_SESSIONS
#   npx wrangler kv namespace create DIAGRAM_SESSIONS --preview
#
# Replace the IDs with the output from the commands above, then redeploy.
#
# [[kv_namespaces]]
# binding = "DIAGRAM_SESSIONS"
# id = "YOUR_KV_NAMESPACE_ID_HERE"
# preview_id = "YOUR_KV_PREVIEW_ID_HERE"

# ─── Durable Objects (PAID plan only — $5/mo) ────────────────────────────────
# Better consistency than KV. Uncomment ONLY with paid Cloudflare Workers plan.
#
# [[durable_objects.bindings]]
# name = "DIAGRAM_SESSION"
# class_name = "DiagramSession"
#
# [[migrations]]
# tag = "v1"
# new_classes = ["DiagramSession"]
