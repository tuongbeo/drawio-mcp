name = "drawio"
main = "src/worker.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm install --include=dev && npm run build:html && node_modules/.bin/tsc"

[vars]
ENVIRONMENT = "production"

[dev]
port = 8787
local_protocol = "http"

