name = "drawio"
main = "src/worker.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm run build"

# ─── Environment variables ────────────────────────────────────────────────────
[vars]
ENVIRONMENT = "production"

# ─── Development ──────────────────────────────────────────────────────────────
[dev]
port = 8787
local_protocol = "http"

# ─── Durable Objects (Phase 3 — requires Workers PAID plan) ──────────────────
# Uncomment below ONLY if you have a paid Cloudflare Workers plan ($5/mo).
# Free tier does NOT support Durable Objects — deploy will fail if enabled.
#
# [[durable_objects.bindings]]
# name = "DIAGRAM_SESSION"
# class_name = "DiagramSession"
#
# [[migrations]]
# tag = "v1"
# new_classes = ["DiagramSession"]

# ─── Worker limits (PAID plan only) ───────────────────────────────────────────
# [limits]
# cpu_ms = 30000
