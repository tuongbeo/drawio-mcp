name = "drawio"
main = "src/worker.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# NOTE: No [build] section — CI runs "npm run build" explicitly before deploy.
# For local deploy: run "npm run build && wrangler deploy" manually.

[vars]
ENVIRONMENT = "production"

[dev]
port = 8787
local_protocol = "http"

