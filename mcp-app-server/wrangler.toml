name = "drawio"
main = "src/worker.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm install --include=dev && npm run build:html && node_modules/.bin/tsc"

[vars]
ENVIRONMENT = "production"

[dev]
port = 8787
local_protocol = "http"

# ─── KV Session Storage — Drawio KV namespace ────────────────────────────────
# Binding name "DIAGRAM_SESSIONS" is what the Worker code reads via env.DIAGRAM_SESSIONS
# KV namespace ID: eb898f3541994511be9dea47b0ac822d (created in Cloudflare dashboard)
# Sessions are stored dynamically at runtime — no pre-populated keys needed.
# Each session key = UUID, value = JSON { xml, title, created_at, updated_at }
# TTL: 24 hours (set automatically by KVSessionStore.set())

[[kv_namespaces]]
binding = "DIAGRAM_SESSIONS"
id = "eb898f3541994511be9dea47b0ac822d"

# ─── Durable Objects (PAID plan only — $5/mo) ────────────────────────────────
# Better consistency than KV. Uncomment ONLY with paid Cloudflare Workers plan.
