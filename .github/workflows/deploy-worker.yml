name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - 'mcp-app-server/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy drawio worker
    defaults:
      run:
        working-directory: mcp-app-server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --include=dev

      - name: Build HTML (inline SDK bundles)
        run: node_modules/.bin/tsx src/build-html.ts || npx --yes tsx src/build-html.ts

      - name: Type-check & compile TypeScript
        run: node_modules/.bin/tsc

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: mcp-app-server
          command: deploy --minify
        env:
          WRANGLER_SEND_METRICS: false
