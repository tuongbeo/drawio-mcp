name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - 'mcp-app-server/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # suppress Node 20 deprecation warning

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy drawio worker
    defaults:
      run:
        working-directory: mcp-app-server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mcp-app-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: mcp-app-server
          # accountId omitted — wrangler infers it from the API token automatically.
          # Set CLOUDFLARE_ACCOUNT_ID secret only if you have multiple CF accounts.
          command: deploy --minify
        env:
          # Prevent wrangler from re-running the build step internally
          WRANGLER_SEND_METRICS: false
